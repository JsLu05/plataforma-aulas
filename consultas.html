<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Consultas Personalizadas - Reporte de Aulas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="consultas.html">
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Reporte de Aulas</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Incidencias</a></li>
                    <li class="nav-item"><a class="nav-link" href="reporte.html">Reportar</a></li>
                    <li class="nav-item"><a class="nav-link active" href="consultas.html">Consultas</a></li>
                    <li class="nav-item" id="authLink"><a class="nav-link" href="login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2>📊 Consultas Personalizadas</h2>
        
        <!-- Pestañas para cambiar entre consultas -->
        <ul class="nav nav-tabs mt-3" id="consultaTab" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="pendientes-tab" data-bs-toggle="tab" data-bs-target="#pendientes" type="button" role="tab">Incidencias Pendientes por Aula</button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="semana-tab" data-bs-toggle="tab" data-bs-target="#semana" type="button" role="tab">Incidencias Última Semana</button>
            </li>
        </ul>

        <div class="tab-content mt-3" id="consultaTabContent">
            <!-- Consulta 1: Pendientes por aula -->
            <div class="tab-pane fade show active" id="pendientes" role="tabpanel">
                <div class="card">
                    <div class="card-header bg-warning">
                        <h5>📋 Incidencias Pendientes agrupadas por Aula</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-bordered table-hover">
                                <thead class="table-dark">
                                    <tr><th>Aula</th><th>Incidencias Pendientes</th></tr>
                                </thead>
                                <tbody id="tablaPendientes">
                                    <tr><td colspan="2" class="text-center">Cargando...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Consulta 2: Última semana -->
            <div class="tab-pane fade" id="semana" role="tabpanel">
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <h5>📅 Incidencias reportadas en la última semana</h5>
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-bordered table-hover">
                                <thead class="table-dark">
                                    <tr><th>ID</th><th>Título</th><th>Tipo</th><th>Estado</th><th>Aula</th><th>Fecha</th></tr>
                                </thead>
                                <tbody id="tablaSemana">
                                    <tr><td colspan="6" class="text-center">Cargando...</td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('access_token');
        const authLink = document.getElementById('authLink');

        // Verificar autenticación
        if (!token) {
            window.location.href = '/login';
        } else {
            authLink.innerHTML = '<a class="nav-link" href="#" onclick="logout()">Cerrar sesión</a>';
            cargarConsultas();
        }

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('id_usuario');
            localStorage.removeItem('rol');
            window.location.href = '/login';
        }

        async function cargarConsultas() {
            await cargarPendientesPorAula();
            await cargarUltimaSemana();
        }

        // Consulta 1: Incidencias pendientes por aula
        async function cargarPendientesPorAula() {
            try {
                const response = await fetch('/api/consultas/incidencias-pendientes-por-aula', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.status === 401) logout();
                
                const data = await response.json();
                const tbody = document.getElementById('tablaPendientes');
                
                if (!data.length) {
                    tbody.innerHTML = '<tr><td colspan="2" class="text-center">No hay incidencias pendientes</td></tr>';
                    return;
                }
                
                tbody.innerHTML = '';
                data.forEach(item => {
                    let badgeClass = item.pendientes > 5 ? 'bg-danger' : (item.pendientes > 2 ? 'bg-warning' : 'bg-success');
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${item.aula}</strong></td>
                            <td><span class="badge ${badgeClass} fs-6">${item.pendientes}</span></td>
                        </tr>
                    `;
                });
            } catch (err) {
                document.getElementById('tablaPendientes').innerHTML = '<tr><td colspan="2" class="text-center text-danger">Error de conexión</td></tr>';
            }
        }

        // Consulta 2: Incidencias última semana
        async function cargarUltimaSemana() {
            try {
                const response = await fetch('/api/consultas/incidencias-ultima-semana', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.status === 401) logout();
                
                const data = await response.json();
                const tbody = document.getElementById('tablaSemana');
                
                if (!data.length) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center">No hay incidencias en la última semana</td></tr>';
                    return;
                }
                
                tbody.innerHTML = '';
                data.forEach(inc => {
                    let estadoClass = inc.estado === 'Pendiente' ? 'bg-warning' : (inc.estado === 'En proceso' ? 'bg-info' : 'bg-success');
                    tbody.innerHTML += `
                        <tr>
                            <td>${inc.id}</td>
                            <td>${inc.titulo}</td>
                            <td>${inc.tipo}</td>
                            <td><span class="badge ${estadoClass}">${inc.estado}</span></td>
                            <td>${inc.aula}</td>
                            <td>${inc.fecha}</td>
                        </tr>
                    `;
                });
            } catch (err) {
                document.getElementById('tablaSemana').innerHTML = '<tr><td colspan="6" class="text-center text-danger">Error de conexión</td></tr>';
            }
        }

        // Recargar cuando se cambia de pestaña
        document.getElementById('pendientes-tab').addEventListener('click', () => cargarPendientesPorAula());
        document.getElementById('semana-tab').addEventListener('click', () => cargarUltimaSemana());
    </script>
</body>
</html>
