<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Login - Reporte de Aulas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Reporte de Aulas</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Incidencias</a></li>
                    <li class="nav-item"><a class="nav-link" href="reporte.html">Reportar</a></li>
                    <li class="nav-item"><a class="nav-link" href="">Consultas</a></li>
                    <li class="nav-item" id="authLink"><a class="nav-link" href="login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header bg-dark text-white">Iniciar sesión</div>
                    <div class="card-body">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label>Correo electrónico</label>
                                <input type="email" id="correo" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Contraseña</label>
                                <input type="password" id="password" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Ingresar</button>
                        </form>
                        <div id="loginError" class="text-danger mt-2"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const correo = document.getElementById('correo').value;
            const password = document.getElementById('password').value;
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo, password })
                });
                if (response.ok) {
                    const data = await response.json();
                    
                    localStorage.setItem('access_token', data.token);
                    localStorage.setItem('id_usuario', data.id_usuario);
                    localStorage.setItem('rol', data.rol);
                    window.location.href = '/dashboard';
                } else {
                    document.getElementById('loginError').innerText = 'Credenciales inválidas';
                }
            } catch (err) {            
                document.getElementById('loginError').innerText = 'Error de conexión';
            }
        });

        
        const token = localStorage.getItem('access_token');
        if (token) {
            document.getElementById('authLink').innerHTML = '<a class="nav-link" href="#" onclick="logout()">Cerrar sesión</a>';
        }
        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('id_usuario');
            localStorage.removeItem('rol');
            window.location.href = '/login';
        }
    </script>
</body>
</html>
