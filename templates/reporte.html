<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reportar Incidencia</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Reporte de Aulas</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/dashboard">Incidencias</a></li>
                    <li class="nav-item"><a class="nav-link" href="/reporte">Reportar</a></li>
                    <li class="nav-item"><a class="nav-link" href="/consultas">Consultas</a></li>
                    <li class="nav-item" id="authLink"><a class="nav-link" href="/login">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-success text-white">Nuevo reporte de incidencia</div>
                    <div class="card-body">
                        <form id="formReporte">
                            <div class="mb-3">
                                <label>Título *</label>
                                <input type="text" id="titulo" class="form-control" required>
                            </div>
                            <div class="mb-3">
                                <label>Aula *</label>
                                <select id="id_aula" class="form-select" required>
                                    <option value="">Cargando aulas...</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label>Tipo de problema *</label>
                                <select id="tipo" class="form-select" required>
                                    <option value="Proyector">Proyector</option>
                                    <option value="Computadora">Computadora</option>
                                    <option value="Iluminacion">Iluminación</option>
                                    <option value="Mobiliario">Mobiliario</option>
                                    <option value="Conectividad">Conectividad</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label>Descripción</label>
                                <textarea id="descripcion" rows="3" class="form-control"></textarea>
                            </div>
                            <div class="mb-3">
                                <label>Estado inicial</label>
                                <select id="estado" class="form-select">
                                    <option value="Pendiente">Pendiente</option>
                                    <option value="En proceso">En proceso</option>
                                    <option value="Resuelto">Resuelto</option>
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Registrar</button>
                        </form>
                        <div id="mensaje" class="mt-3"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('access_token');
        const idUsuario = localStorage.getItem('id_usuario');
        const authLink = document.getElementById('authLink');

        if (!token || !idUsuario) {
            document.getElementById('formReporte').querySelector('button').disabled = true;
            document.getElementById('mensaje').innerHTML = '<div class="alert alert-warning">Debes <a href="login.html">iniciar sesión</a> para reportar.</div>';
        } else {
            
            cargarAulas();
        }

        function logout() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('id_usuario');
            localStorage.removeItem('rol');
            window.location.href = '/login';
        }

        if (token) {
            authLink.innerHTML = '<a class="nav-link" href="#" onclick="logout()">Cerrar sesión</a>';
        }

        async function cargarAulas() {
            try {
                const response = await fetch('/api/aulas', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (response.ok) {
                    const aulas = await response.json();
                    const select = document.getElementById('id_aula');
                    select.innerHTML = '<option value="">Seleccione un aula</option>';
                    aulas.forEach(aula => {
                        select.innerHTML += `<option value="${aula.id_aula}">${aula.nombre} (Piso ${aula.piso}, Cap. ${aula.capacidad})</option>`;
                    });
                } else {
                    document.getElementById('id_aula').innerHTML = '<option value="">Error al cargar aulas</option>';
                }
            } catch (err) {
                document.getElementById('id_aula').innerHTML = '<option value="">Error de conexión</option>';
            }
        }

        const form = document.getElementById('formReporte');
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!token || !idUsuario) {
                window.location.href = 'login.html';
                return;
            }
            const incidencia = {
                titulo: document.getElementById('titulo').value,
                id_aula: parseInt(document.getElementById('id_aula').value),
                tipo: document.getElementById('tipo').value,
                descripcion: document.getElementById('descripcion').value,
                estado: document.getElementById('estado').value,
                id_usuario: parseInt(idUsuario)
            };
            
            if (!incidencia.id_aula) {
                document.getElementById('mensaje').innerHTML = '<div class="alert alert-danger">Seleccione un aula</div>';
                return;
            }
            try {
                const response = await fetch('/api/incidencias', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(incidencia)
                });
                if (response.ok) {
                    document.getElementById('mensaje').innerHTML = '<div class="alert alert-success">Incidencia registrada exitosamente</div>';
                    form.reset();
                    
                    document.getElementById('id_aula').value = '';
                } else {
                    const error = await response.json();
                    document.getElementById('mensaje').innerHTML = `<div class="alert alert-danger">Error: ${error.mensaje || 'No se pudo registrar'}</div>`;
                }
            } catch (err) {
                document.getElementById('mensaje').innerHTML = '<div class="alert alert-danger">Error de conexión con el servidor</div>';
            }
        });
    </script>
</body>
</html>
