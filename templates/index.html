<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inicio - Reporte Inteligente de Aulas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
  
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Reporte de Aulas</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Incidencias</a></li>
                    <li class="nav-item"><a class="nav-link" href="reporte.html">Reportar</a></li>
                    <li class="nav-item"><a class="nav-link" href="">Consultas</a></li>
                    <li class="nav-item" id="authLink"><a class="nav-link" href="login.html">Login</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="p-5 bg-light rounded-3 text-center">
            <h1 class="display-4">Plataforma de Reporte Inteligente de Aulas</h1>
            <p class="lead">Reporta problemas de proyectores, computadoras, iluminación, mobiliario o conectividad.</p>
            <hr>
            <p>Da seguimiento a cada incidencia hasta su solución.</p>
            <a class="btn btn-primary btn-lg" href="dashboard.html">Ver incidencias</a>
            <a class="btn btn-success btn-lg" href="reporte.html">Reportar nueva</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        
        const token = localStorage.getItem('access_token');
        const authLink = document.getElementById('authLink');
        if (token) {
            authLink.innerHTML = '<a class="nav-link" href="#" onclick="logout()">Cerrar sesión</a>';
        }
        function logout() {
            localStorage.removeItem('access_token');
            window.location.href = '/login';
        }
    </script>
</body>
</html>
